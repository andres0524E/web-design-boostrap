<!-- FORMULARIO -->
<div class="container d-flex justify-content-center align-items-center formulario-container">

<div class="card formulario-card shadow-lg">

<div class="card-body">

<h4 class="text-center">REGISTRO DE NUEVO USUARIO</h4>

<p class="text-center text-muted small">
<i class="fa-solid fa-user"></i>
Complete los siguientes campos obligatorios
</p>

<form>

<div class="mb-3">

<label class="form-label">
Nombre Completo (Ej: Juan Pérez) *
</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-user"></i>
</span>

<input type="text" class="form-control" placeholder="Su nombre completo">

</div>

</div>

<div class="mb-3">

<label class="form-label">
Correo Electrónico (Válido y activo) *
</label>

<div class="input-group">

<input type="email" class="form-control" placeholder="correo@ejemplo.com">

<span class="input-group-text">
<i class="fa-solid fa-envelope-open"></i>
</span>

</div>

</div>

<div class="mb-3">

<label class="form-label">
Número de Teléfono (10 dígitos) *
</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-mobile"></i>
</span>

<input type="text" class="form-control" placeholder="+52 55 1234 5678">

</div>

</div>

<div class="mb-3">

<label class="form-label">
Ciudad de Residencia (Ej: Ciudad de México) *
</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-city"></i>
</span>

<input type="text" class="form-control" placeholder="Ingrese su ciudad">

</div>

</div>

<div class="mb-3">

<label class="form-label">
Contraseña (Min. 8 caracteres, números y letras) *
</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-lock"></i>
</span>

<input type="password" class="form-control" placeholder="********">

</div>

</div>

<div class="form-check mb-3">

<input class="form-check-input" type="checkbox">

<label class="form-check-label">
Acepto los Términos y Condiciones
</label>

</div>

<button class="btn btn-registro w-100">

ENVIAR REGISTRO
<i class="fa-solid fa-arrow-right"></i>

</button>

</form>

</div>
</div>
</div>
